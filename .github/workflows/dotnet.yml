name: .NET

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore ./Tests/Tests.csproj

    - name: Build Tests project
      run: dotnet build ./Tests/Tests.csproj --no-restore

    - name: Run Tests
      run: dotnet test ./Tests/Tests.csproj --no-build --verbosity normal

  validate_version:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
    - uses: actions/checkout@v4

    - name: Install dos2unix
      run: sudo apt-get install dos2unix

    - name: Validate Project Versions
      run: |
        echo "📦 Checking versions match version.txt..."
        dos2unix ./Altruist/validate_versions.sh
        chmod +x ./Altruist/validate_versions.sh
        ./Altruist/validate_versions.sh

  release:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Read version
      id: version
      run: echo "VERSION=v$(cat Altruist/version.txt)" >> $GITHUB_OUTPUT

    - name: Pack NuGet packages
      run: dotnet pack ./Altruist --configuration Release --output ./nupkgs

    - name: Create Tag
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag "${{ steps.version.outputs.VERSION }}" || echo "Tag already exists"
        git push origin "${{ steps.version.outputs.VERSION }}" || echo "Tag already pushed"

    - name: Create GitHub Release
      env:
        VERSION: ${{ steps.version.outputs.VERSION }}
        GH_PAT: ${{ secrets.ACTION_PAT }}
      run: |
        echo "📦 Creating GitHub release for $VERSION"

        API_RESPONSE=$(curl -s -X POST "https://api.github.com/repos/${{ github.repository }}/releases" \
          -H "Authorization: token $GH_PAT" \
          -H "Accept: application/vnd.github+json" \
          -d "$(jq -n \
            --arg tag "$VERSION" \
            --arg name "$VERSION" \
            --arg body "Release $VERSION" \
            '{ tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false }')")

        UPLOAD_URL=$(echo "$API_RESPONSE" | jq -r '.upload_url' | sed 's/{?name,label}//')

        for file in ./nupkgs/*.nupkg; do
          FILENAME=$(basename "$file")
          echo "📤 Uploading $FILENAME"
          curl -s --data-binary @"$file" \
            -H "Authorization: token $GH_PAT" \
            -H "Content-Type: application/octet-stream" \
            "$UPLOAD_URL?name=$FILENAME"
        done

        echo "✅ Release created."

    - name: Publish to NuGet
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        dotnet nuget push ./nupkgs/*.nupkg -k "$NUGET_API_KEY" -s https://api.nuget.org/v3/index.json --skip-duplicate
