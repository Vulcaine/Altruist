name: .NET

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore ./Tests/Tests.csproj

    - name: Build Tests project
      run: dotnet build ./Tests/Tests.csproj --no-restore

    - name: Run Tests
      run: dotnet test ./Tests/Tests.csproj --no-build --verbosity normal

  validate_version:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
    - uses: actions/checkout@v4

    - name: Install dos2unix
      run: sudo apt-get install dos2unix

    - name: Validate Project Versions
      run: |
        echo "📦 Checking versions match version.txt..."
        dos2unix ./Altruist/validate_versions.sh
        chmod +x ./Altruist/validate_versions.sh
        ./Altruist/validate_versions.sh

  release:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Read version
      id: version
      run: echo "VERSION=v$(cat Altruist/version.txt)" >> $GITHUB_OUTPUT

    - name: Pack NuGet packages
      run: dotnet pack ./Altruist --configuration Release --output ./nupkgs

    - name: Create Tag
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag "${{ steps.version.outputs.VERSION }}" || echo "Tag already exists"
        git push origin "${{ steps.version.outputs.VERSION }}" || echo "Tag already pushed"

    - name: Create GitHub Release
      id: create_release
      env:
        VERSION: ${{ steps.version.outputs.VERSION }}
        GH_TOKEN: ${{ secrets.ACTION_PAT }}
      run: |
        echo "📦 Creating GitHub release for $VERSION"

        # Create release using gh CLI (more reliable than curl)
        gh release create "$VERSION" \
          --repo "${{ github.repository }}" \
          --title "$VERSION" \
          --notes "Release $VERSION" \
          ./nupkgs/*.nupkg

        echo "✅ Release created with artifacts."

    - name: Publish to NuGet
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        dotnet nuget push ./nupkgs/*.nupkg -k "$NUGET_API_KEY" -s https://api.nuget.org/v3/index.json --skip-duplicate
